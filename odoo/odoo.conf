[options]
; This is the password that allows database operations:
admin_passwd = admin

; Server configuration
xmlrpc_port = 8069
longpolling_port = 8072

; Database configuration
db_host = odoo-db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = postgres

; Logging
logfile = /var/log/odoo/odoo.log
log_level = info

; Performance
limit_time_real = 120
limit_time_cpu = 60
workers = 2

; Data directory
data_dir = /var/lib/odoo
